<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>SIEM Login</title></head>
<body style="font-family:Arial,sans-serif;max-width:460px;margin:40px auto;">
  <h1>M365 SIEM Login</h1>
  <p>Sign in with your assigned role account (admin, manager, or user).</p>
  {% if error %}<p style="color:#b00020;"><strong>{{ error }}</strong></p>{% endif %}
  <form method="post" action="/login" style="display:grid;gap:8px;">
    <input name="username" placeholder="Username" required />
    <input name="password" placeholder="Password" type="password" required />
    <button type="submit">Sign In</button>
  </form>
</body>
</html>
