<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Initial Admin Setup</title>
</head>
<body style="font-family:Arial,sans-serif;max-width:500px;margin:40px auto;">
  <h1>First Startup Setup</h1>
  <p>Create the initial <strong>Admin</strong> account password.</p>
  {% if error %}<p style="color:#b00020;"><strong>{{ error }}</strong></p>{% endif %}
  <form method="post" action="/setup" style="display:grid;gap:10px;">
    <label>Username</label>
    <input value="Admin" disabled />
    <label>Password</label>
    <input name="password" type="password" placeholder="Enter admin password" required />
    <label>Confirm Password</label>
    <input name="confirm_password" type="password" placeholder="Confirm admin password" required />
    <button type="submit">Create Admin Account</button>
  </form>
</body>
</html>
